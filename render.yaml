services:
  - type: web
    name: smartapply-backend
    env: python
    buildCommand: pip install -r requirements.txt && cd frontend-react && npm install && npm run build
    startCommand: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: PORT
        value: 8000
      - key: SECRET_KEY
        generateValue: true
      - key: MONGODB_URL
        sync: false # Set this in Render Dashboard
      - key: MONGODB_DB_NAME
        value: smartapply
      - key: FRONTEND_URL
        sync: false # Set this to your Render URL
