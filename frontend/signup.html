<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Create Account — SmartApply</title>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    .btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 20px;background:var(--surface);color:var(--text);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:"DM Sans",sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:var(--transition);text-decoration:none;min-height:var(--touch-target)}
    .btn-google:hover{background:var(--bg-2);border-color:var(--primary);box-shadow:var(--shadow);color:var(--text)}
    .or-divider{display:flex;align-items:center;gap:12px;margin:8px 0;color:var(--text-3);font-size:13px}
    .or-divider::before,.or-divider::after{content:"";flex:1;height:1px;background:var(--border)}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div id="toast-container"></div>
  <div style="position:fixed;top:20px;right:20px;z-index:999">
    <button id="theme-toggle" class="btn btn-ghost btn-sm" aria-label="Toggle theme" onclick="window.toggleTheme()">
      <i class="fa-solid fa-moon"></i>
    </button>
  </div>
  <div class="auth-wrapper">

    <!-- Signup step -->
    <div class="auth-card fade-in" id="signup-step">
      <div class="logo"><div class="logo-dot"></div>Smart<span>Apply</span></div>
      <h2>Create your account</h2>
      <p class="subtitle">Start automating your job applications today</p>

      <a href="/api/auth/google" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign up with Google
      </a>

      <div class="or-divider">or sign up with email</div>

      <div id="signup-error" class="alert alert-error hidden" style="margin-bottom:16px"></div>
      <form id="signup-form" novalidate>
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="form-group">
            <label><i class="fa-solid fa-envelope"></i> Email Address</label>
            <input type="email" id="email" placeholder="you@company.com" autocomplete="email"/>
            <span class="field-error"></span>
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-lock"></i> Password</label>
            <div class="pw-wrap">
              <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password"/>
              <button type="button" class="pw-toggle" id="toggle-pw1" aria-label="Toggle password">
                <i class="fa-regular fa-eye" id="pw-icon1"></i>
              </button>
            </div>
            <div class="pw-strength"><div class="pw-bar" id="bar1"></div><div class="pw-bar" id="bar2"></div><div class="pw-bar" id="bar3"></div><div class="pw-bar" id="bar4"></div></div>
            <span class="field-error"></span>
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-lock"></i> Confirm Password</label>
            <div class="pw-wrap">
              <input type="password" id="confirm_password" placeholder="Repeat your password" autocomplete="new-password"/>
              <button type="button" class="pw-toggle" id="toggle-pw2" aria-label="Toggle password">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            <span class="field-error"></span>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="signup-btn">
            <span class="spinner"></span>
            <span class="btn-text"><i class="fa-solid fa-user-plus"></i> Create Account</span>
          </button>
        </div>
      </form>
      <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
    </div>

    <!-- Verify step -->
    <div class="auth-card fade-in hidden" id="verify-step">
      <div class="logo"><div class="logo-dot"></div>Smart<span>Apply</span></div>
      <h2>Verify your email</h2>
      <p class="subtitle" id="verify-subtitle">Enter the 6-digit code sent to your email</p>
      <div id="verify-error" class="alert alert-error hidden" style="margin-bottom:16px"></div>
      <div class="pin-inputs" id="pin-inputs">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code"/>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      </div>
      <button class="btn btn-primary btn-block btn-lg" id="verify-btn">
        <span class="spinner"></span>
        <span class="btn-text"><i class="fa-solid fa-circle-check"></i> Verify Email</span>
      </button>
      <div class="auth-footer"><span id="resend-timer"></span><a href="#" id="resend-link" class="hidden">Resend code</a></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let currentEmail = '', resendCountdown;

    document.getElementById('toggle-pw1').addEventListener('click', () => {
      const el = document.getElementById('password');
      const ic = document.getElementById('pw-icon1');
      el.type = el.type === 'password' ? 'text' : 'password';
      ic.className = el.type === 'password' ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
    });
    document.getElementById('toggle-pw2').addEventListener('click', () => {
      const el = document.getElementById('confirm_password');
      el.type = el.type === 'password' ? 'text' : 'password';
    });

    const pwInput = document.getElementById('password');
    const bars = [1,2,3,4].map(i => document.getElementById('bar'+i));
    pwInput.addEventListener('input', () => renderStrength(bars, pwInput.value));

    document.getElementById('signup-form').addEventListener('submit', async e => {
      e.preventDefault();
      clearErrors();
      const btn     = document.getElementById('signup-btn');
      const email   = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm_password').value;
      const errEl   = document.getElementById('signup-error');
      errEl.classList.add('hidden');
      let hasError = false;
      if (!email)             { markFieldError('email', 'Email is required'); hasError = true; }
      if (password.length < 8){ markFieldError('password', 'Minimum 8 characters'); hasError = true; }
      if (password !== confirm){ markFieldError('confirm_password', 'Passwords do not match'); hasError = true; }
      if (hasError) return;
      setLoading(btn, true);
      try {
        await api.post('/auth/signup', { email, password, confirm_password: confirm });
        currentEmail = email;
        document.getElementById('signup-step').classList.add('hidden');
        document.getElementById('verify-step').classList.remove('hidden');
        document.getElementById('verify-subtitle').textContent = 'Enter the 6-digit code sent to ' + email;
        startResendTimer(60);
        document.querySelector('#pin-inputs input').focus();
      } catch (err) {
        errEl.textContent = err.detail || 'Something went wrong';
        errEl.classList.remove('hidden');
      } finally { setLoading(btn, false); }
    });

    auth.requireGuest();
    if (window.updateThemeIcon) window.updateThemeIcon();
    document.querySelectorAll('#pin-inputs input').forEach((input, idx, inputs) => {
      input.addEventListener('input', e => {
        const val = e.target.value.replace(/\D/g, '');
        e.target.value = val;
        if (val) { e.target.classList.add('filled'); if (idx < inputs.length - 1) inputs[idx + 1].focus(); }
        else e.target.classList.remove('filled');
      });
      input.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !input.value && idx > 0) {
          inputs[idx - 1].focus(); inputs[idx - 1].value = ''; inputs[idx - 1].classList.remove('filled');
        }
      });
      input.addEventListener('paste', e => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
        text.split('').forEach((ch, i) => { if (inputs[i]) { inputs[i].value = ch; inputs[i].classList.add('filled'); } });
        if (text.length < 6) inputs[text.length]?.focus(); else inputs[5].focus();
      });
    });

    function getPin() { return [...document.querySelectorAll('#pin-inputs input')].map(i => i.value).join(''); }

    document.getElementById('verify-btn').addEventListener('click', async () => {
      const pin = getPin();
      const btn = document.getElementById('verify-btn');
      const errEl = document.getElementById('verify-error');
      errEl.classList.add('hidden');
      if (pin.length !== 6) { errEl.textContent = 'Enter all 6 digits'; errEl.classList.remove('hidden'); return; }
      setLoading(btn, true);
      try {
        await api.post('/auth/verify', { email: currentEmail, pin });
        showToast('Email verified! Redirecting…', 'success');
        setTimeout(() => window.location.href = 'login.html', 1200);
      } catch (err) {
        errEl.textContent = err.detail || 'Invalid code';
        errEl.classList.remove('hidden');
      } finally { setLoading(btn, false); }
    });

    function startResendTimer(seconds) {
      const timerEl = document.getElementById('resend-timer');
      const linkEl  = document.getElementById('resend-link');
      linkEl.classList.add('hidden');
      timerEl.textContent = 'Resend in ' + seconds + 's';
      clearInterval(resendCountdown);
      let remaining = seconds;
      resendCountdown = setInterval(() => {
        remaining--;
        if (remaining <= 0) { clearInterval(resendCountdown); timerEl.textContent = ''; linkEl.classList.remove('hidden'); }
        else timerEl.textContent = 'Resend in ' + remaining + 's';
      }, 1000);
    }

    document.getElementById('resend-link').addEventListener('click', async e => {
      e.preventDefault();
      try { await api.post('/auth/resend-pin', { email: currentEmail }); showToast('Code resent!', 'info'); startResendTimer(60); }
      catch (err) { showToast(err.detail || 'Failed', 'error'); }
    });
  </script>
</body>
</html>
